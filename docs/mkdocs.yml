site_name: wdm-transform
site_description: Experimental object-oriented WDM transform package.
repo_url: https://github.com/pywavelet/wdm_transform
repo_name: wdm-transform
edit_uri: edit/main/docs/
docs_dir: .
site_dir: ../site

theme:
  name: material
  palette:
    scheme: default
    primary: white
    accent: blue grey
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.action.view
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths:
            - ../src
          options:
            docstring_style: google
            docstring_section_style: list
            group_by_category: false
            heading_level: 2
            members_order: source
            separate_signature: true
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            show_source: true
  - mkdocs-jupyter:
      include:
        - "*.py"
        - "*.ipynb"
      ignore:
        - "__pycache__/*"
      execute: true
      include_source: true
      show_input: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Guide:
      - Package Layout: guide/package-layout.md
      - API Overview: guide/api-overview.md
  - Examples:
      - WDM Walkthrough: examples/wdm_walkthrough.py
