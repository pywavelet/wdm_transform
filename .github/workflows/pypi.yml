name: pypi

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/wdm-transform
    concurrency:
      group: pypi-release
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether to release
        id: release
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if git log --format=%s "${{ github.event.before }}..${{ github.sha }}" \
            | grep -Eq '^(fix|feat|add):'; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Install uv
        if: steps.release.outputs.enabled == 'true'
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        if: steps.release.outputs.enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.release.outputs.enabled == 'true'
        run: uv sync --frozen --extra dev --extra jax

      - name: Run tests
        if: steps.release.outputs.enabled == 'true'
        run: uv run pytest

      - name: Detect existing release tag
        if: steps.release.outputs.enabled == 'true'
        id: release_tag
        run: |
          tag="$(git tag --points-at HEAD --list 'v*' | sort -V | tail -n 1)"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Configure Git
        if: steps.release.outputs.enabled == 'true' && steps.release_tag.outputs.tag == ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and create tag
        if: steps.release.outputs.enabled == 'true' && steps.release_tag.outputs.tag == ''
        run: uv run cz bump --yes --annotated-tag

      - name: Push release commit and tag
        if: steps.release.outputs.enabled == 'true' && steps.release_tag.outputs.tag == ''
        run: git push origin HEAD:main --follow-tags

      - name: Build distributions
        if: steps.release.outputs.enabled == 'true'
        run: uv build

      - name: Check distribution metadata
        if: steps.release.outputs.enabled == 'true'
        run: uvx twine check dist/*

      - name: Upload distributions
        if: steps.release.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        if: steps.release.outputs.enabled == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
