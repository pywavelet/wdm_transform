name: docs

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --extra docs

      - name: Restore notebook execution cache
        uses: actions/cache@v4
        with:
          path: .cache/mkdocs-jupyter
          key: mkdocs-jupyter-${{ runner.os }}-${{ hashFiles('mkdocs.yml', 'pyproject.toml', 'uv.lock', 'docs/**/*.py', 'docs/**/*.md') }}
          restore-keys: |
            mkdocs-jupyter-${{ runner.os }}-

      - name: Build docs
        run: uv run mkdocs build --strict -f mkdocs.yml

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy-docs:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
